name: Deploy to WordPress.org

permissions:
  contents: read

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

env:
  plugin_name: vk-block-patterns

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-versions: ['8.2', '8.3']
        wp-versions: ['6.9']
    steps:
      - name: Validate tag format (x.y.z)
        run: |
          [[ "${GITHUB_REF_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "Invalid tag: ${GITHUB_REF_NAME} (expected x.y.z)"
            exit 1
          }
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.14.0
      - name: Setup PHP ${{ matrix.php-versions }}
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: ${{ matrix.php-versions }}
      - name: Cache vendor
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: vendor
          key: ${{ runner.os }}-php${{ matrix.php-versions }}-${{ hashFiles('**/composer.lock') }}
      - name: Install dependencies
        run: npm install && composer install
      - name: Create dist
        run: npm run dist
      - name: Create wp-env override for dist smoke test
        run: |
          printf '{"plugins": ["./dist/%s"]}' "${{ env.plugin_name }}" > wp-env.override.json
      - name: Start wp-env (dist)
        run: |
          n=0
          until [ "$n" -ge 3 ]
          do
            WP_ENV_PHP_VERSION=${{ matrix.php-versions }} WP_ENV_CORE=WordPress/WordPress#${{ matrix.wp-versions }} npm run wp-env start --update && break
            n=$((n+1))
            echo "Retrying wp-env start --update ($n)..."
            sleep 5
          done
          [ "$n" -lt 3 ] || exit 1
          sudo chmod -R 777 ~/wp-env
      - name: Smoke Test (dist)
        uses: vektor-inc/wp-actions/smoke-test@90f5a231bc956543bf235f36be4928d57af2edab # main
      - name: Switch wp-env to source for PHPUnit
        run: |
          rm wp-env.override.json
          n=0
          until [ "$n" -ge 3 ]
          do
            WP_ENV_PHP_VERSION=${{ matrix.php-versions }} WP_ENV_CORE=WordPress/WordPress#${{ matrix.wp-versions }} npm run wp-env start --update && break
            n=$((n+1))
            echo "Retrying wp-env start --update ($n)..."
            sleep 5
          done
          [ "$n" -lt 3 ] || exit 1
          sudo chmod -R 777 ~/wp-env
      - name: Run PHPUnit (source)
        run: npm run phpunit

  deploy:
    name: Deploy to .org
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.14.0
      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.3'
      - name: Install dependencies
        run: npm install
      - name: Create dist
        run: npm run dist
      - name: WordPress Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@54bd289b8525fd23a5c365ec369185f2966529c2 # stable
        env:
          BUILD_DIR: dist/vk-block-patterns
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SLUG: vk-block-patterns

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [test, deploy]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.14.0
      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.3'
      - name: Install dependencies
        run: npm install
      - name: Create dist
        run: npm run dist
      - name: Create zip
        run: |
          cd dist/ && zip -r ${{ env.plugin_name }}.zip ${{ env.plugin_name }}/ && mv ${{ env.plugin_name }}.zip ${GITHUB_WORKSPACE}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: ${{ env.plugin_name }}.zip
          generate_release_notes: true
